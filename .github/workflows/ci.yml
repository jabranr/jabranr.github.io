name: CI Checks

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npm run format:check

      - name: Install Chromium browser
        if: ${{ github.event_name == 'pull_request' }}
        run: npx playwright install --with-deps chromium

      - name: Run Playwright functional tests
        if: ${{ github.event_name == 'pull_request' }}
        env:
          CI: true
        run: npm run test:functional

      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deployment-status:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Cloudflare Pages deployment
        uses: jabranr/workflows/.github/actions/wait-cf-pages-deployment@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Purge Cloudflare cache
        if: ${{ github.event_name == 'push' }}
        env:
          CF_PURGE_CACHE_TOKEN: ${{ secrets.CF_PURGE_CACHE_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          curl "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
          -H 'Content-Type: application/json' \
          -H "Authorization: Bearer $CF_PURGE_CACHE_TOKEN" \
          -d '{"purge_everything": true}'

  e2e-tests:
    if: ${{ github.event_name == 'push' }}
    needs: deployment-status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Install Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        env:
          CI: true
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  performance-audit:
    needs: deployment-status
    runs-on: ubuntu-latest
    steps:
      - name: Get domain
        id: get-domain
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then
            echo "domain=https://$GITHUB_HEAD_REF.jabranr.pages.dev" >> $GITHUB_OUTPUT
          else
            echo "domain=https://jabran.me" >> $GITHUB_OUTPUT
          fi

      - name: Performance Audit
        uses: jabranr/workflows/.github/actions/performance-audit@main
        with:
          urls: '${{ steps.get-domain.outputs.domain }},${{ steps.get-domain.outputs.domain }}/resume/,${{ steps.get-domain.outputs.domain }}/articles/,${{ steps.get-domain.outputs.domain }}/projects/,${{ steps.get-domain.outputs.domain }}/speaking/'
          github-token: ${{ secrets.GITHUB_TOKEN }}
